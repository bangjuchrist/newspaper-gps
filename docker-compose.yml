services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TIMEZONE: Asia/Seoul
    volumes:
      - ./metabase-data:/metabase-data   # Metabase 내부 DB
      - ./data:/data:ro                  # 크롤링 데이터 (읽기전용)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
